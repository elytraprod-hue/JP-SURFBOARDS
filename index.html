<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Surfboards | It comes in waves</title>
    <meta name="description" content="Pranchas de Surf de alta performance. Shape by Johnny.">
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="selection:bg-black selection:text-white bg-zinc-50">

    <header class="fixed w-full top-0 z-50 bg-transparent text-white mix-blend-difference hover:bg-black/90 hover:mix-blend-normal transition-all duration-300 group" id="mainHeader">
        <nav class="max-w-screen-2xl mx-auto px-6 py-6 flex justify-between items-center">
            <!-- EDITADO: Logo alinhada horizontalmente com o nome de exibição, ajustado para as novas rotas -->
            <a href="index.html" class="flex items-center gap-3 text-xl md:text-2xl font-bold tracking-tighter uppercase whitespace-nowrap">
                <img src="./assets/images/logo/logo.png" alt="Logo" class="w-8 h-8 md:w-10 md:h-10 object-contain invert group-hover:invert-0 filter transition-all hidden" onerror="this.style.display='none'">
                <span>JP Surfboards</span>
            </a>
            <div class="hidden md:flex gap-8 text-xs font-semibold tracking-widest uppercase">
                <a href="modelos.html" class="cursor-pointer hover:opacity-50 transition-opacity">Coleção</a>
                <a href="#galeria" class="cursor-pointer hover:opacity-50 transition-opacity">Visuals</a>
            </div>
            <button class="md:hidden text-2xl">☰</button>
        </nav>
    </header>

    <section class="relative h-screen flex flex-col items-center justify-center overflow-hidden bg-black text-white">
        <video autoplay loop muted playsinline poster="./assets/images/models/black-buffalo-home.jpg" class="absolute inset-0 w-full h-full object-cover opacity-70 z-10 pointer-events-none grayscale brightness-75 bg-zinc-900 transition-opacity duration-1000">
            <source src="./assets/videos/bg-home.mov" type="video/mp4">
            <source src="./assets/videos/bg-home.mov" type="video/quicktime">
        </video>
        
        <div class="z-20 text-center px-4 w-full mt-24 relative max-w-5xl mx-auto" id="hero-content">
            <h1 class="text-6xl md:text-8xl lg:text-9xl font-bold tracking-tighter uppercase mb-6 leading-none opacity-0 translate-y-[50px]">
                It comes<br>in waves
            </h1>
            <p class="text-lg md:text-xl font-light mb-12 tracking-[0.2em] opacity-0 uppercase drop-shadow-md text-zinc-300">Shape by Johnny.</p>
            <a href="modelos.html" class="opacity-0 bg-white inline-block text-black px-10 py-4 font-bold uppercase tracking-widest text-xs hover:bg-zinc-200 transition-colors cursor-pointer rounded-sm">
                Explorar Coleção
            </a>
        </div>
    </section>

    <!-- Partial Coleção Modulada via main.js card builder -->
    <section id="modelos" class="py-24 md:py-32 px-6 max-w-screen-2xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 px-2 md:px-4">
            <div class="max-w-xl">
                <h2 class="text-4xl md:text-6xl font-bold tracking-tighter uppercase mb-3">Vitrine</h2>
                <p class="text-zinc-500 font-light text-lg md:text-xl tracking-wide leading-relaxed">Os nossos clássicos testados ao limite.</p>
            </div>
            <a href="modelos.html" class="uppercase tracking-widest text-[10px] md:text-xs font-bold border-b border-black pb-1 hover:opacity-50 transition mt-8 md:mt-0 inline-block">Ver Catálogo Completo</a>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 px-4" id="productsGrid"></div>
    </section>

    <!-- Banner O Shaper Fixo -->
    <section class="bg-black text-white py-24 md:py-32 px-6">
        <div class="max-w-screen-xl mx-auto flex flex-col md:flex-row items-center gap-12 md:gap-20">
            <div class="w-full md:w-5/12 aspect-[4/5] bg-zinc-900 flex items-center justify-center overflow-hidden relative group border border-zinc-800 rounded-sm">
                <!-- EDITADO: Imagem do Shaper (OShaper.jpg) posicionada e responsiva -->
                <img src="./assets/images/sobre/OShaper.jpg" loading="lazy" class="w-full h-full object-cover object-top grayscale opacity-80 group-hover:opacity-100 transition-opacity duration-500" onerror="this.src='./assets/images/logo/logo.png'; this.classList.remove('object-cover'); this.classList.add('object-contain', 'p-8', 'opacity-50');">
            </div>
            <div class="w-full md:w-7/12 space-y-6 md:space-y-8">
                <h2 class="text-4xl md:text-6xl font-bold tracking-tighter uppercase leading-none">O Shaper</h2>
                <p class="text-lg md:text-xl font-light leading-relaxed opacity-80 text-zinc-300 max-w-lg">Modelos meticulosamente concebidos para alta performance e prazer nas ondas, enraizados no Rio Tavares.</p>
            </div>
        </div>
    </section>

    <script src="./js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
             const h1 = document.querySelector("#hero-content h1");
             const p = document.querySelector("#hero-content p");
             const btn = document.querySelector("#hero-content a");
             if(h1) gsap.to(h1, { y: 0, opacity: 1, duration: 1.5, ease: "power4.out", delay: 0.1 });
             if(p) gsap.to(p, { opacity: 1, duration: 1, ease: "power2.out", delay: 0.5 });
             if(btn) gsap.to(btn, { opacity: 1, duration: 1, ease: "power2.out", delay: 0.8 });
             
             // Usa o helper isolado de vitrine para popular top 4 model cards com Padrão Dims
             document.getElementById('productsGrid').innerHTML = productsLocalDB.slice(0, 4).map(p => renderProductCard(p)).join('');
        });
    </script>
</body>
</html>
